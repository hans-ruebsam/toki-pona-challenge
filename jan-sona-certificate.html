  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1008;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'IM Fell English', serif;
    padding: 20px;
  }

  .page {
    width: 820px;
    background: #fdf6e3;
    position: relative;
    padding: 48px 64px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    box-shadow: 0 0 80px rgba(0,0,0,0.7);
  }

  .page::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 15% 25%, rgba(180,140,60,0.09) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 75%, rgba(160,100,40,0.07) 0%, transparent 50%);
    pointer-events: none;
  }

  .border-outer { position:absolute; inset:13px; border:2.5px solid #8b6914; pointer-events:none; }
  .border-inner { position:absolute; inset:20px; border:1px solid #c8a030; pointer-events:none; }
  .corner { position:absolute; color:#8b6914; font-size:20px; }
  .corner.tl { top:6px; left:6px; }
  .corner.tr { top:6px; right:6px; }
  .corner.bl { bottom:6px; left:6px; }
  .corner.br { bottom:6px; right:6px; }

  /* Each glyph = svg + label stacked */
  .glyph {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .glyph svg {
    stroke: #4a2e08;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    display: block;
  }
  .glyph .word {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: #8b6020;
    text-align: center;
    line-height: 1;
  }

  .glyph-row {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* size variants */
  .glyph-row.xl .glyph svg { width: 52px; height: 52px; stroke-width: 2.2; }
  .glyph-row.xl .glyph .word { font-size: 0.75rem; }

  .glyph-row.lg .glyph svg { width: 42px; height: 42px; stroke-width: 2.2; }
  .glyph-row.lg .glyph .word { font-size: 0.65rem; }

  .glyph-row.md .glyph svg { width: 34px; height: 34px; stroke-width: 2.0; }
  .glyph-row.md .glyph .word { font-size: 0.6rem; }

  .glyph-row.sm .glyph svg { width: 26px; height: 26px; stroke-width: 1.8; }
  .glyph-row.sm .glyph .word { font-size: 0.55rem; }

  .divider {
    width: 55%;
    height: 1px;
    background: linear-gradient(to right, transparent, #b8922a 30%, #b8922a 70%, transparent);

  .orn { color: #b8922a; letter-spacing: 0.6em; font-size: 1rem; }

  .name-input {

    color: #4a2e08;

    border: none;

  }

    color: #c8a878;
    font-size: 1rem;
    font-family: 'IM Fell English', serif;
  }
  /* Shown only during print – Firefox doesn't print input values */
  .name-print {
    display: none;
    font-family: 'Cinzel Decorative', serif;
    font-size: 2rem;
    color: #4a2e08;
    text-align: center;
    width: 100%;
    max-width: 660px;
    border-bottom: 2px solid #b8922a;
    letter-spacing: 0.1em;
    font-kerning: none;
    padding: 4px 2px;
  }

  .seal-row {
    display: flex; align-items: center; gap: 32px; margin-top: 4px;
  }
  .seal {
    width: 68px; height: 68px;
    border: 3px solid #8b6914;
    border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(180,140,60,0.06);
    gap: 2px;
  }
  .seal svg {
    stroke: #8b6914; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none;
  }
  .sig-line {
    width: 175px; display: flex; flex-direction: column; align-items: center; gap: 5px;
  }
  .sig-line hr { display:none; }
  .sig-line .hr { width:100%; height:1px; background:#b8922a; }
  .sig-label {
    display: flex; align-items: flex-end; justify-content: center; gap: 4px;

  .sig-label .glyph .word { font-size: 0.5rem; color: #a07828; }

  .date-label { font-size: 0.85rem; color: #8b6914; font-family: 'IM Fell English', serif; }

  .print-btn {

  }
  .print-btn:hover { background: #8b6914; }
  @media print {
    @page {

      margin: 0;
    }
    html, body {

      height: 210mm;
      margin: 0;
      padding: 0;
      background: white;
    }
    body {

    .page {

</style>
